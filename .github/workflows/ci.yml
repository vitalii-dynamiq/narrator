name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (Next.js standalone)
        # Catches build regressions and exercises the same code path Railway does.
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build Docker image
        # Confirms the Dockerfile + entrypoint assemble cleanly on every PR.
        run: docker build -t unity-narrator:ci .
