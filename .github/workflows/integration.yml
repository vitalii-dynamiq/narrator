name: Integration (live Anthropic API)

# Costs real tokens. Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Test file glob (e.g. fortuna-fp) — blank runs the full suite"
        required: false
        default: ""

concurrency:
  group: integration
  cancel-in-progress: false

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start server in background
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORT: "7340"
          NODE_ENV: "production"
        run: |
          nohup node .next/standalone/server.js > /tmp/unity.log 2>&1 &
          echo $! > /tmp/unity.pid

      - name: Wait for server to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsSL -o /dev/null http://localhost:7340/; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start. Log tail:"
          tail -40 /tmp/unity.log || true
          exit 1

      - name: Run integration suite
        env:
          UNITY_BASE_URL: http://localhost:7340
        run: |
          if [ -n "${{ inputs.filter }}" ]; then
            npx vitest run "test/integration/${{ inputs.filter }}*"
          else
            npm run test:integration
          fi

      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/unity.pid)" || true

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-server-log
          path: /tmp/unity.log
          retention-days: 3
